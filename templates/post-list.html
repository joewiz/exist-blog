<div data-template="app:post-list">
    <header class="blog-header">
        <h1>eXist-db Blog</h1>
        <p class="blog-tagline">News, releases, and developer stories from the eXist-db project</p>
    </header>

    <div class="blog-layout">
        <main class="post-list">
            <div data-template="app:each-post">
                <article class="post-summary">
                    <h2 class="post-title">
                        <a data-template="lib:attr" data-template-attr="href"
                           data-template-value="app:post-field($model, 'url')"
                           href="#">
                            <span data-template="app:post-field" data-template-field="title"/>
                        </a>
                    </h2>
                    <div class="post-meta">
                        <time data-template="app:post-field" data-template-field="date"/>
                        <span class="post-author">
                            by <span data-template="app:post-field" data-template-field="author"/>
                        </span>
                    </div>
                    <p class="post-excerpt" data-template="app:post-field" data-template-field="summary"/>
                    <div data-template="app:post-tags"/>
                </article>
            </div>

            <div data-template="app:pagination"/>
        </main>

        <aside class="blog-sidebar">
            <section class="sidebar-section" data-template="app:tag-list">
                <h3>Tags</h3>
                <ul class="tag-cloud" data-template="app:each-tag">
                    <li>
                        <a data-template="lib:attr" data-template-attr="href"
                           data-template-value="$model?tag-url" href="#">
                            <span data-template="lib:value" data-template-value="$model?tag-name"/>
                            (<span data-template="lib:value" data-template-value="$model?tag-count"/>)
                        </a>
                    </li>
                </ul>
            </section>

            <section class="sidebar-section">
                <h3>Subscribe</h3>
                <a href="feed.xml" class="feed-link">Atom Feed</a>
            </section>
        </aside>
    </div>
</div>
