<div data-template="app:if-editor">
    <header class="admin-header">
        <h1>Blog Admin</h1>
        <a href="admin/editor" class="btn btn-primary">New Post</a>
    </header>

    <div class="admin-post-list" id="admin-post-list">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Date</th>
                    <th>Author</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="admin-posts-body">
                <!-- Populated by admin.js -->
            </tbody>
        </table>
    </div>

    <script type="module" src="resources/js/admin.js"></script>
</div>
